<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Demo Adivino</title>
  </head>
  <body>
    <div class="terminal">
      <div class="terminal-header">
        <div class="window-btn close"></div>
        <div class="window-btn minimize"></div>
        <div class="window-btn maximize"></div>
        <div class="terminal-title">fortune-teller.sh</div>
      </div>
    <div class="terminal-body">
        <div class="output">
            🎲 ~~ Fortune Teller ~~ 🎲<br><br>
            Ask me a yes or no question, and I'll predict your fortune!
        </div>
        <div id="output-area"></div>
        <div class="input-line">
            <span class="prompt">$></span>
            <input type="text" id="user-input" placeholder="Type your question here..." autofocus>
        </div>
        <div id="fortune-display" class="fortune"></div>
        <button onclick="resetFortune()">🔄 Ask New Question</button>
    </div>
    </div>
  </body>
</html>
